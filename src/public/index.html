<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <title>Lista de Tarefas</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Lista de Tarefas</h1>

<input id="title" placeholder="Nova tarefa">

<button id="btn-adicionar" onclick="adicionar()">
    Adicionar
</button>

<ul id="lista"></ul>

<script>
async function carregar() {
    const res = await fetch("/tasks");
    const tarefas = await res.json();

    lista.innerHTML = "";

    tarefas.forEach(t => {
        lista.innerHTML += `<li>${t.title}</li>`;
    });
}

async function adicionar() {
    const titleValue = document.getElementById("title").value;

    const res = await fetch("/tasks", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            title: titleValue
        })
    });

    if (res.ok) {
        document.getElementById("title").value = "";
        carregar();
    }
}

// Suporte a pressionar Enter para submeter (tarefa E2E 9)
document.getElementById("title").addEventListener("keydown", function (event) {
    if (event.key === "Enter") {
        adicionar();
    }
});

carregar();
</script>

</body>
</html>
